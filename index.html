<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>페이퍼 거래소 — 모의 투자</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --bg:#0E1116; --surface:#161B22; --surface2:#1C232E; --line:#262E3A;
    --text:#E6E9EF; --muted:#8A94A6; --up:#2BD673; --down:#FF5C5C;
    --gold:#F5B642; --goldDim:#5A4A1E; --blue:#5B9DF5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);min-height:100vh;
    font-family:"Pretendard",system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:ui-monospace,"SFMono-Regular",Menlo,monospace;font-variant-numeric:tabular-nums}
  .wrap{max-width:1080px;margin:0 auto;padding:0 16px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}
  .up{color:var(--up)} .down{color:var(--down)} .muted{color:var(--muted)} .gold{color:var(--gold)} .blue{color:var(--blue)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px}
  .btn-primary{background:var(--gold);color:#1A1407;font-weight:800;border-radius:12px;padding:14px;width:100%;transition:transform .05s}
  .btn-primary:active{transform:scale(.97)}
  .pill{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:6px 12px}
  .field{width:100%;margin-top:8px;padding:13px 14px;border-radius:12px;background:var(--bg);
    border:1px solid var(--line);color:var(--text);font-size:15px;outline:none}
  .field:focus{border-color:var(--goldDim)}
  .center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .tag{font-size:11px;font-weight:800;letter-spacing:.18em;color:var(--gold)}
  .row{display:flex;align-items:center;justify-content:space-between}
  .badge{padding:2px 8px;border-radius:6px;font-size:12px;font-weight:800}
  .b-buy{background:rgba(43,214,115,.12);color:var(--up)}
  .b-sell{background:rgba(255,92,92,.12);color:var(--down)}
  .sm{font-size:12px} .lg{font-size:30px;font-weight:800}
  .stock-row,.news-row,.hold-row,.hist-row{border-top:1px solid var(--line);padding:12px 0}
  .tradebtn{padding:7px 13px;border-radius:9px;font-weight:800;font-size:14px;border:1px solid;transition:transform .05s}
  .tradebtn:active{transform:scale(.95)}
  .t-buy{background:rgba(43,214,115,.12);color:var(--up);border-color:rgba(43,214,115,.25)}
  .t-sell{background:rgba(255,92,92,.12);color:var(--down);border-color:rgba(255,92,92,.25)}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;
    justify-content:center;padding:16px;z-index:50}
  .timerbar{height:4px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:10px}
  .timerbar > i{display:block;height:100%;background:var(--gold);transition:width 1s linear}
  .cols{display:grid;grid-template-columns:1.1fr 1fr;gap:16px}
  @media(max-width:760px){.cols{grid-template-columns:1fr}}
  .ghost{background:var(--bg);border:1px dashed var(--line);border-radius:12px;padding:22px;text-align:center;color:var(--muted)}
  .tier-chip{font-size:11px;font-weight:800;padding:2px 7px;border-radius:6px}
  .tier1{background:rgba(138,148,166,.15);color:var(--muted)}
  .tier2{background:rgba(245,182,66,.14);color:var(--gold)}
  .tier3{background:rgba(43,214,115,.14);color:var(--up)}
  .nav{position:sticky;top:0;z-index:20;background:rgba(14,17,22,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line)}
  .navtab{padding:8px 14px;border-radius:10px;font-weight:700;font-size:14px}
  .navtab.on{background:var(--surface2);color:var(--text)}
  .navtab.off{color:var(--muted)}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =====================================================================
   페이퍼 거래소 — 개인 모드 (0단계)
   - 단일 정적 파일. GitHub Pages에 index.html 하나만 올리면 동작.
   - 진행 상황(현금/보유종목/은행/시세)이 localStorage에 저장되어 이어집니다.
   - 라운드 개념 없이 무한 진행. 1분마다 시세·뉴스가 바뀜.
   - 상단 메뉴: 주식 / 랭킹. (코인·미니게임은 멀티 전용이라 없음)
   - 은행: 예치하면 1분마다 이자. 금리 뉴스에 따라 이자율이 바뀜.
   ===================================================================== */

const START_CASH = 1_000_000;
const TICK_SECONDS = 60;          // 시세·뉴스 갱신 주기
const BASE_RATE = 0.003;          // 은행 기본 이자율(분당)

/* ---- 종목 (업종별) ---- */
const STOCKS = [
  { t:"HBP",   name:"한빛제약",     sector:"제약",     p:184.2 },
  { t:"GAON",  name:"가온항공",     sector:"항공",     p:42.6 },
  { t:"TSE",   name:"태성에너지",   sector:"에너지",   p:68.1 },
  { t:"NURI",  name:"누리반도체",   sector:"기술",     p:311.4 },
  { t:"MIDAM", name:"미담푸드",     sector:"식음료",   p:13.4 },
  { t:"GRNW",  name:"그린웨이브",   sector:"친환경",   p:96.7 },
  { t:"DSF",   name:"대성금융",     sector:"금융",     p:27.9 },
  { t:"STAR",  name:"스타게이트",   sector:"우주항공", p:458.0 },
];

/* ---- 사건(이벤트): 업종 영향 + 단계별 기사(여러 표현) ---- */
const BIG=0.18, MID=0.10, SML=0.05;
const EVENTS = [
  { id:"pandemic", label:"감염병 확산", impact:{제약:BIG, 항공:-BIG, 식음료:SML},
    t3:["전국 감염병 비상 — 백신·치료제 수요 폭증, 제약주 강세 전망","감염병 재확산 공식화…제약·바이오 풀가동, 항공은 직격탄"],
    t2:["보건 당국 '감염병 주시'…의료·제약 섹터에 시선 집중","확진 다시 늘어…제약주 들썩, 여행 심리는 위축"],
    t1:["요즘 병원이 붐빈다는 소문","마스크 다시 챙긴다는 얘기가 돈다"] },
  { id:"oilup", label:"유가 급등", impact:{에너지:BIG, 항공:-MID},
    t3:["국제 유가 급등 — 에너지주 수혜, 항공주 연료비 부담","유가 배럴당 신고가…정유·에너지 강세, 항공 비용 압박"],
    t2:["원유 시장 들썩…에너지 관련주 주목","중동 변수에 유가 출렁, 운송주 주의"],
    t1:["기름값이 또 올랐다는 말","주유소 가격표가 무섭다더라"] },
  { id:"oildown", label:"유가 폭락", impact:{에너지:-BIG, 항공:MID},

    t2:["원유 약세 흐름…운송·항공에 호재 가능성","유가 하락 전환, 에너지 섹터 차익 매물"],

  { id:"ai", label:"AI 수요 폭발", impact:{기술:BIG, 친환경:SML},

    t2:["중앙은행 매파 발언…예금 금리 오를 듯, 기술주 주의","금리 인상 가능성에 은행 예금 관심 ↑"],

  { id:"rate_down", label:"금리 인하", impact:{금융:-SML, 기술:MID},
    t3:["기준금리 인하 — 예금 금리 하락, 기술·성장주엔 호재","금리 인하로 은행 예금 매력 둔화, 위험자산 선호 ↑"],
    t2:["비둘기 신호에 예금 금리 내릴 듯, 기술주 반색","금리 인하 기대…은행 이자 메리트 축소"],
    t1:["예금 이자가 좀 짜졌다는 말","은행 금리 내린다더라"] },
  { id:"space", label:"우주 개발 호재", impact:{우주항공:BIG, 기술:SML},
    t3:["대형 우주 프로젝트 발표 — 우주항공주 급등 전망","국가 우주 예산 확대…우주항공 수주 기대 폭발"],
    t2:["우주 산업 투자 확대 소식…관련주 들썩","위성 발사 일정 공개에 우주주 강세"],
    t1:["로켓 발사 성공했다던데","우주 관련 뉴스가 자주 보인다"] },
  { id:"green", label:"친환경 정책", impact:{친환경:BIG, 에너지:-MID},
    t3:["대규모 친환경 보조금 발표 — 신재생주 강세, 화석연료주 약세","탄소 규제 강화안 통과…그린주 급등, 전통 에너지 부진"],
    t2:["정부 친환경 드라이브…그린 섹터 주목","재생에너지 지원 확대 논의, 에너지 지형 변화"],
    t1:["환경 규제 강화한다는 말","태양광 얘기가 또 나온다"] },
  { id:"food", label:"식량 위기", impact:{식음료:BIG, 항공:-SML},
    t3:["국제 곡물가 급등 — 식음료주 가격 전가 기대","이상기후로 작황 부진…식품 가격 인상 도미노"],
    t2:["공급망 차질로 식품 섹터 변동성 확대","곡물 수입가 상승, 식음료 마진 주목"],
    t1:["마트 물가가 무섭다","장보기가 겁난다는 얘기"] },
  { id:"travel", label:"여행 수요 회복", impact:{항공:BIG, 식음료:SML},
    t3:["여행 수요 폭발 — 항공주 본격 반등 전망","해외여행 예약 급증…항공·면세 동반 강세"],
    t2:["성수기 예약 급증…항공·여행 섹터 호조","리오프닝 효과 본격화, 여행주 주목"],
    t1:["공항이 붐빈다는 소식","다들 여행 간다더라"] },
  { id:"chip_reg", label:"반도체 규제", impact:{기술:-BIG},
    t3:["반도체 수출 규제 강화 — 기술주 직격탄 우려","주요국 반도체 제재 확대…공급망 충격 경고"],
    t2:["규제 리스크 부각…반도체 섹터 약세 가능성","수출 통제 소식에 기술주 투자 심리 위축"],
    t1:["수출 규제 어쩌고 하던데","반도체 규제 뉴스가 시끄럽다"] },
  { id:"fin_crisis", label:"금융 불안", impact:{금융:-BIG, 기술:-SML, 에너지:-SML},
    t3:["금융권 부실 우려 확산 — 금융주 급락, 위험 회피 심화","일부 은행 유동성 경고…금융 시스템 불안 부각"],
    t2:["신용 경계감 확대…금융 섹터 주의보","연체율 상승 신호에 금융주 약세"],
    t1:["은행이 좀 불안하다는 소문","금융 쪽이 뒤숭숭하다더라"] },
];
const COMPANIES = ["한경데일리","머니투데이","시장의 눈","루머스"];

/* ---------- 유틸 ---------- */
const won = n => Math.round(n).toLocaleString("ko-KR");
const price = n => n.toLocaleString("ko-KR",{minimumFractionDigits:2,maximumFractionDigits:2});
const pct = n => (n>=0?"+":"")+(n*100).toFixed(2)+"%";
const rand = (a,b)=>a+Math.random()*(b-a);
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
const $ = id => document.getElementById(id);
const ls = {
  get(k){ try{return JSON.parse(localStorage.getItem(k));}catch{return null;} },
  set(k,v){ localStorage.setItem(k,JSON.stringify(v)); },
};

/* ---------- 전역 상태 ---------- */
let S = { screen:"auth", user:null, tab:"stocks" };
let G = null;
let timer = null;

/* ===================================================================
   인증
   =================================================================== */
function renderAuth(){
  S.authTab = S.authTab || "login";
  $("app").innerHTML = `
  <div class="center"><div style="width:100%;max-width:380px">
    <div style="text-align:center;margin-bottom:28px">
      <div class="tag">P A P E R</div>
      <h1 style="font-size:30px;font-weight:800;letter-spacing:-.02em;margin-top:6px">페이퍼 거래소</h1>
      <p class="muted sm" style="margin-top:8px">뉴스를 읽고, 가상 종목에 투자하라.</p>
    </div>
    <div class="card" style="display:flex;padding:6px;margin-bottom:18px">
      <button id="tab-login" style="flex:1;padding:10px;border-radius:11px;font-weight:700;
        background:${S.authTab==="login"?"var(--surface2)":"transparent"};
        color:${S.authTab==="login"?"var(--text)":"var(--muted)"}">로그인</button>
      <button id="tab-signup" style="flex:1;padding:10px;border-radius:11px;font-weight:700;
        background:${S.authTab==="signup"?"var(--surface2)":"transparent"};
        color:${S.authTab==="signup"?"var(--text)":"var(--muted)"}">회원가입</button>
    </div>
    <div class="card" style="padding:22px">
      <label class="muted sm" style="font-weight:600">아이디</label>
      <input id="in-id" class="field" placeholder="trader01" />
      <div style="height:14px"></div>
      <label class="muted sm" style="font-weight:600">비밀번호</label>
      <input id="in-pw" class="field" type="password" placeholder="••••" />
      <div id="auth-err" class="down sm" style="margin-top:12px"></div>
      <button id="auth-go" class="btn-primary" style="margin-top:16px">
        ${S.authTab==="login"?"로그인":"가입하고 시작하기"}</button>
    </div>
    <p style="color:var(--goldDim);font-size:11px;margin-top:14px;text-align:center;line-height:1.6">
      데모입니다. 비밀번호는 암호화 없이 저장되니 실제 비밀번호는 넣지 마세요.</p>
  </div></div>`;
  $("tab-login").onclick = ()=>{ S.authTab="login"; renderAuth(); };
  $("tab-signup").onclick = ()=>{ S.authTab="signup"; renderAuth(); };
  $("auth-go").onclick = doAuth;
  $("in-pw").onkeydown = e => { if(e.key==="Enter") doAuth(); };
}
function doAuth(){
  const id=$("in-id").value.trim(), pw=$("in-pw").value, err=$("auth-err");
  if(id.length<2){ err.textContent="아이디는 2자 이상이어야 합니다."; return; }
  if(pw.length<4){ err.textContent="비밀번호는 4자 이상이어야 합니다."; return; }
  const users = ls.get("users")||{};
  if(S.authTab==="signup"){
    if(users[id]){ err.textContent="이미 존재하는 아이디입니다."; return; }
    users[id]={pw}; ls.set("users",users);
  } else {
    if(!users[id]){ err.textContent="존재하지 않는 아이디입니다."; return; }
    if(users[id].pw!==pw){ err.textContent="비밀번호가 일치하지 않습니다."; return; }
  }
  S.user=id; S.screen="mode"; render();
}

/* ===================================================================
   모드 선택
   =================================================================== */
function renderMode(){
  const saved = ls.get("game:"+S.user);
  $("app").innerHTML = `
  <div class="center"><div style="width:100%;max-width:440px">
    <div class="row" style="margin-bottom:22px">
      <div><div class="tag">PAPER 거래소</div>
        <div style="font-size:20px;font-weight:800;margin-top:4px">${S.user}님, 환영합니다</div></div>
      <button id="logout" class="pill muted sm">로그아웃</button>
    </div>
    <button id="m-solo" class="card" style="width:100%;text-align:left;padding:22px;margin-bottom:14px">
      <div class="row"><div style="font-size:18px;font-weight:800">개인 모드</div>
        ${saved?`<span class="tier-chip tier3">이어하기</span>`:""}</div>
      <div class="muted sm" style="margin-top:6px">
        ${saved?`저장된 자산 ₩${won(saved.netWorth)} — 이어서 진행합니다.`
               :"1분마다 바뀌는 시세·뉴스를 보며 자유롭게 투자합니다."}</div>
    </button>
    <button id="m-multi" class="card" style="width:100%;text-align:left;padding:22px;opacity:.7">
      <div class="row"><div style="font-size:18px;font-weight:800">멀티 모드</div>
        <span class="tier-chip tier2">준비 중</span></div>
      <div class="muted sm" style="margin-top:6px">친구들과 방을 만들어 라운드 대결. (2단계 · Supabase 연동 예정)</div>
    </button>
  </div></div>`;
  $("logout").onclick=()=>{ saveGame(); S.user=null; G=null; S.screen="auth"; render(); };
  $("m-solo").onclick=startGame;
  $("m-multi").onclick=()=>alert("멀티 모드는 실시간 서버(Supabase)가 필요해 2단계에서 추가됩니다.\n기획서.md에 전체 설계가 정리되어 있어요.");
}

/* ===================================================================
   게임 시작 / 저장 / 불러오기
   =================================================================== */
function startGame(){
  const saved = ls.get("game:"+S.user);
  if(saved && saved.market){
    G = saved;
    if(G.bank==null) G.bank=0;
    if(G.rate==null) G.rate=BASE_RATE;
    if(!G.events||!G.events.length) rollMarket();
  } else {
    G = {
      cash:START_CASH, bank:0, rate:BASE_RATE,
      holdings:{}, history:[],
      market:STOCKS.map(s=>({...s, prev:s.p, base:s.p})),
      events:[], news:[], lastEventIds:[],
      timeLeft:TICK_SECONDS,
    };
    rollMarket();
  }
  S.tab="stocks"; S.screen="game"; render();
  clearInterval(timer); timer=setInterval(tick,1000);
}
function netWorth(){
  let v=G.cash+(G.bank||0);
  for(const[t,h] of Object.entries(G.holdings)){
    const s=G.market.find(x=>x.t===t); if(s) v+=s.p*h.shares;
  }
  return v;
}
function saveGame(){
  if(!G||!S.user) return;
  G.netWorth = netWorth();
  G.updatedAt = Date.now();
  ls.set("game:"+S.user, G);
}

/* ---- 시세·뉴스·금리 갱신 ---- */
function rollMarket(){
  // 이전과 다른 사건이 나오도록 시도
  let active;
  for(let tryN=0; tryN<6; tryN++){
    const n = Math.random()<0.5?1:2;
    const pool=[...EVENTS]; active=[];
    for(let i=0;i<n;i++) active.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);
    const ids = active.map(e=>e.id).sort().join(",");
    if(ids!==(G.lastEventIds||[]).slice().sort().join(",")) break;
  }
  G.events = active;
  G.lastEventIds = active.map(e=>e.id);

  // 금리: 활성 사건에 따라 은행 이자율 조정
  let r=BASE_RATE;
  active.forEach(ev=>{ if(ev.id==="rate_up") r=0.006; else if(ev.id==="rate_down") r=0.001; });
  G.rate=r;

  // 뉴스 생성: 활성 사건 → 3·2·1단계(랜덤 표현/신문사) + 가짜 소문
  const used=active.map(e=>e.id);
  const news=[]; let nid=0;
  active.forEach(ev=>{
    news.push({id:nid++, tier:3, company:pick(COMPANIES.slice(0,3)), text:pick(ev.t3)});
    news.push({id:nid++, tier:2, company:pick(COMPANIES.slice(0,3)), text:pick(ev.t2)});
    news.push({id:nid++, tier:1, company:pick(COMPANIES),          text:pick(ev.t1)});
  });
  const fakes=EVENTS.filter(e=>!used.includes(e.id)).sort(()=>Math.random()-.5).slice(0,1+Math.floor(Math.random()*2));
  fakes.forEach(ev=> news.push({id:nid++, tier:1, company:"루머스", text:pick(ev.t1)}));
  // 은행 이자 동향 기사(가끔)
  if(Math.random()<0.5){
    const word = G.rate>BASE_RATE?"오르는":G.rate<BASE_RATE?"내리는":"잠잠한";
    news.push({id:nid++, tier:2, company:pick(["한경데일리","머니투데이"]),
      text:`은행 예금 금리, 최근 ${word} 분위기 — 현재 분당 약 ${(G.rate*100).toFixed(1)}% 수준`});
  }
  G.news = news.sort(()=>Math.random()-.5);
}

function tick(){
  if(!G) return;
  G.timeLeft--;
  if(G.timeLeft<=0){ marketTick(); return; }
  const el=$("timer"); if(el) el.textContent=fmtTime(G.timeLeft);
  const bar=$("timerfill"); if(bar) bar.style.width=(G.timeLeft/TICK_SECONDS*100)+"%";
}
function fmtTime(s){ return `0:${String(s).padStart(2,"0")}`; }

function marketTick(){
  // 1) 주가 변동
  G.market.forEach(s=>{
    let delta=0;
    G.events.forEach(ev=>{ if(ev.impact[s.sector]!=null) delta+=ev.impact[s.sector]; });
    delta += rand(-0.04,0.04);
    s.prev=s.p; s.p=Math.max(0.5, s.p*(1+delta));
  });
  // 2) 은행 이자 지급(현재 이자율 기준)
  if(G.bank>0) G.bank += G.bank*G.rate;
  // 3) 새 사건/뉴스/금리
  rollMarket();
  // 4) 저장 & 렌더
  G.timeLeft=TICK_SECONDS;
  saveGame();
  render();
}

function exitGame(){
  if(!confirm("나가시겠어요? 진행 상황은 저장되며 다음에 이어서 할 수 있어요.")) return;
  saveGame();
  clearInterval(timer); timer=null;
  S.screen="mode"; render();
}

/* ---------- 거래 ---------- */
function execute(t, side, qty){
  const s=G.market.find(x=>x.t===t); if(!s||qty<=0) return;
  const cost=s.p*qty;
  if(side==="buy"){
    if(G.cash<cost){ alert("현금이 부족합니다."); return; }
    G.cash-=cost;
    const h=G.holdings[t]||{shares:0,avgCost:0};
    const ns=h.shares+qty; h.avgCost=(h.avgCost*h.shares+cost)/ns; h.shares=ns;
    G.holdings[t]=h;
  } else {
    const h=G.holdings[t];
    if(!h||h.shares<qty){ alert("보유 수량이 부족합니다."); return; }
    G.cash+=cost; h.shares-=qty;
    if(h.shares===0) delete G.holdings[t]; else G.holdings[t]=h;
  }
  G.history.unshift({id:Date.now(),t,side,qty,price:s.p,at:Date.now()});
  G.history=G.history.slice(0,40);
  closeModal(); saveGame(); render();
}
/* ---------- 은행 ---------- */
function deposit(amt){
  amt=Math.floor(amt);
  if(!amt||amt<=0) return;
  if(G.cash<amt){ alert("현금이 부족합니다."); return; }
  G.cash-=amt; G.bank=(G.bank||0)+amt; saveGame(); render();
}
function withdraw(amt){
  amt=Math.floor(amt);
  if(!amt||amt<=0) return;
  if((G.bank||0)<amt){ alert("예치금이 부족합니다."); return; }
  G.bank-=amt; G.cash+=amt; saveGame(); render();
}

/* ===================================================================
   게임 화면 (상단 메뉴 + 탭별 내용)
   =================================================================== */
function topNav(){
  const tabBtn=(id,label)=>`<button class="navtab ${S.tab===id?'on':'off'}" data-tab="${id}">${label}</button>`;
  return `<div class="nav"><div class="wrap row" style="padding:10px 16px">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="tag">PAPER</span>
      <div style="display:flex;gap:4px">${tabBtn("stocks","주식")}</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="muted sm">${S.user}</span>
      <button id="exit" class="pill sm muted">나가기</button>
    </div>
  </div></div>`;
}
function renderGame(){
  const content = stocksView();
  $("app").innerHTML = topNav() + `<div class="wrap" style="padding-top:14px;padding-bottom:40px">${content}</div>`;
  document.querySelectorAll(".navtab").forEach(b=>b.onclick=()=>{ S.tab=b.dataset.tab; render(); });
  $("exit").onclick=exitGame;
  if(S.tab==="stocks") bindStocks();
}

/* ---------- 주식 탭 ---------- */
function stocksView(){
  const total=netWorth(), pl=total-START_CASH, plp=pl/START_CASH, up=pl>=0;
  return `
    <div class="row" style="flex-wrap:wrap;gap:10px;margin-bottom:10px">
      <div>
        <div class="muted sm">총 자산 (현금+예금+주식)</div>
        <div style="display:flex;align-items:baseline;gap:12px">
          <span class="mono lg">₩${won(total)}</span>
          <span class="mono ${up?'up':'down'}">${pct(plp)} (${up?'+':''}${won(pl)})</span>
        </div>
      </div>
      <div style="text-align:right">
        <div class="mono" style="font-size:22px;font-weight:800" id="timer">${fmtTime(G.timeLeft)}</div>
        <div class="muted sm">⏱ 다음 변동까지</div>
      </div>
    </div>
    <div class="timerbar"><i id="timerfill" style="width:${G.timeLeft/TICK_SECONDS*100}%"></i></div>
    <div class="cols" style="margin-top:14px">
      <div>${marketCard()}${holdingsCard()}</div>
      <div>${bankCard()}${newsCard()}${historyCard()}</div>
    </div>`;
}
function bindStocks(){
  G.market.forEach(s=>{
    const b=$("buy-"+s.t), sl=$("sell-"+s.t);
    if(b) b.onclick=()=>openTrade(s.t,"buy");
    if(sl) sl.onclick=()=>openTrade(s.t,"sell");
  });
  const dep=$("bankDep"), wd=$("bankWd");
  if(dep) dep.onclick=()=>{ deposit(+$("bankAmt").value); };
  if(wd) wd.onclick=()=>{ withdraw(+$("bankAmt").value); };
}

function marketCard(){
  return `<div class="card" style="padding:18px;margin-bottom:16px">
    <div class="row" style="margin-bottom:6px"><b>시장</b><span class="muted sm">8종목 · 1분마다 변동</span></div>
    ${G.market.map(s=>{
      const ch=(s.p-s.base)/s.base, tk=s.p-s.prev, up=ch>=0;
      return `<div class="row stock-row">
        <div><div style="font-weight:700">${s.t} <span class="muted sm">${s.name}</span></div>
          <div class="muted sm">${s.sector}</div></div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="text-align:right">
            <div class="mono ${tk>=0?'up':'down'}">${price(s.p)}</div>
            <div class="mono sm ${up?'up':'down'}">${pct(ch)}</div></div>
          <div style="display:flex;gap:6px">
            <button id="buy-${s.t}" class="tradebtn t-buy">매수</button>
            <button id="sell-${s.t}" class="tradebtn t-sell">매도</button></div>
        </div></div>`;
    }).join("")}
  </div>`;
}
function holdingsCard(){
  const hs=Object.entries(G.holdings);
  return `<div class="card" style="padding:18px">
    <div class="row" style="margin-bottom:6px"><b>보유 종목</b></div>
    ${hs.length===0 ? `<div class="ghost">아직 보유한 종목이 없습니다.</div>` :
    hs.map(([t,h])=>{
      const s=G.market.find(x=>x.t===t), cur=s?s.p:h.avgCost;
      const plv=(cur-h.avgCost)*h.shares, plp=(cur-h.avgCost)/h.avgCost, up=plv>=0;
      return `<div class="row hold-row">
        <div><div style="font-weight:700">${t}</div>
          <div class="muted sm mono">${h.shares}주 · 평단 ${price(h.avgCost)}</div></div>
        <div style="text-align:right">
          <div class="mono">₩${won(cur*h.shares)}</div>
          <div class="mono sm ${up?'up':'down'}">${up?'+':''}${won(plv)} (${pct(plp)})</div></div>
      </div>`;
    }).join("")}
  </div>`;
}
function bankCard(){
  return `<div class="card" style="padding:18px;margin-bottom:16px">
    <div class="row" style="margin-bottom:8px"><b>🏦 은행</b>
      <span class="blue sm mono">이자 1분당 ${(G.rate*100).toFixed(1)}%</span></div>
    <div class="row" style="margin-bottom:10px">
      <span class="muted sm">예치금</span>
      <span class="mono" style="font-size:17px;font-weight:700">₩${won(G.bank||0)}</span></div>
    <input id="bankAmt" class="field" type="number" placeholder="금액 입력" style="margin-top:0" />
    <div style="display:flex;gap:8px;margin-top:8px">
      <button id="bankDep" class="tradebtn t-buy" style="flex:1;text-align:center">입금</button>
      <button id="bankWd" class="tradebtn t-sell" style="flex:1;text-align:center">출금</button>
    </div>
    <div class="muted sm" style="margin-top:8px">예치금은 매 분 이자가 붙습니다. 금리 뉴스에 따라 이자율이 변해요.</div>
  </div>`;
}
function newsCard(){
  const tierLabel={1:"1단계",2:"2단계",3:"3단계"};
  return `<div class="card" style="padding:18px;margin-bottom:16px">
    <div class="row" style="margin-bottom:6px"><b>뉴스</b>
      <span class="muted sm">신문사·등급마다 정보의 질이 다름</span></div>
    ${G.news.map(n=>`<div class="news-row">
        <div style="display:flex;align-items:center;gap:7px">
          <span class="tier-chip tier${n.tier}">${tierLabel[n.tier]}</span>
          <span class="muted sm">${n.company}</span></div>
        <div style="margin-top:7px;font-size:14px;line-height:1.5">${n.text}</div>
      </div>`).join("")}
  </div>`;
}
function historyCard(){
  return `<div class="card" style="padding:18px">
    <div class="row" style="margin-bottom:6px"><b>거래내역</b><span class="muted sm">${G.history.length}건</span></div>
    ${G.history.length===0 ? `<div class="ghost">아직 거래가 없습니다.</div>` :
    G.history.map(h=>`<div class="row hist-row">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="badge ${h.side==='buy'?'b-buy':'b-sell'}">${h.side==='buy'?'매수':'매도'}</span>
        <b>${h.t}</b><span class="muted sm mono">${h.qty}주 @ ${price(h.price)}</span></div>
    </div>`).join("")}
  </div>`;
}


/* ---------- 거래 모달 ---------- */
let modalState=null;
function openTrade(t, side){
  modalState={t,side,qty:1};
  const wrap=document.createElement("div"); wrap.id="modal"; document.body.appendChild(wrap);
  renderModal();
}
function closeModal(){ const m=$("modal"); if(m) m.remove(); modalState=null; }
function renderModal(){
  if(!modalState) return;
  const {t,side,qty}=modalState;
  const s=G.market.find(x=>x.t===t), buy=side==="buy";
  const cost=s.p*qty, owned=G.holdings[t]?.shares||0, maxBuy=Math.floor(G.cash/s.p);
  $("modal").innerHTML=`
  <div class="modal-bg" id="mbg">
    <div class="card" style="width:100%;max-width:360px;padding:22px" onclick="event.stopPropagation()">
      <div class="row" style="margin-bottom:16px">
        <div><div style="font-size:20px;font-weight:800">${s.t}
          <span class="badge ${buy?'b-buy':'b-sell'}">${buy?'매수':'매도'}</span></div>
          <div class="muted sm">${s.name}</div></div>
        <button id="mx" class="muted" style="font-size:20px">✕</button></div>
      <div class="row" style="margin-bottom:14px"><span class="muted sm">현재가</span>
        <span class="mono" style="font-size:18px;font-weight:700">${price(s.p)}</span></div>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <button id="mm" class="card" style="width:44px;height:44px;font-size:20px;font-weight:800">−</button>
        <input id="mq" class="field" style="text-align:center;margin-top:0" value="${qty}" />
        <button id="mp" class="card" style="width:44px;height:44px;font-size:20px;font-weight:800">+</button>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:16px">
        <button class="qbtn card sm" data-q="${buy?maxBuy:owned}" style="flex:1;padding:7px;color:var(--muted)">${buy?'최대':'전량'} (${buy?maxBuy:owned})</button>
        <button class="qbtn card sm" data-q="${Math.floor((buy?maxBuy:owned)/2)}" style="flex:1;padding:7px;color:var(--muted)">절반</button>
      </div>
      <div class="row" style="margin-bottom:16px"><span class="muted sm">${buy?'필요 현금':'예상 수령액'}</span>
        <span class="mono" style="font-size:16px;font-weight:700">₩${won(cost)}</span></div>
      <button id="mgo" class="btn-primary" style="background:${buy?'var(--up)':'var(--down)'};color:#0E1116">
        ${qty}주 ${buy?'매수':'매도'}</button>
      <div class="muted sm" style="text-align:center;margin-top:10px">
        ${buy?`보유 현금 ₩${won(G.cash)}`:`보유 수량 ${owned}주`}</div>
    </div>
  </div>`;
  $("mbg").onclick=closeModal;
  $("mx").onclick=closeModal;
  $("mm").onclick=()=>{ modalState.qty=Math.max(1,qty-1); renderModal(); };
  $("mp").onclick=()=>{ modalState.qty=qty+1; renderModal(); };
  $("mq").oninput=e=>{ modalState.qty=Math.max(1,parseInt(e.target.value)||1); };
  document.querySelectorAll(".qbtn").forEach(b=>b.onclick=()=>{ modalState.qty=Math.max(1,+b.dataset.q); renderModal(); });
  $("mgo").onclick=()=>execute(t,side,modalState.qty);
}

/* ===================================================================
   라우터
   =================================================================== */
function render(){
  if(S.screen!=="game"){ clearInterval(timer); timer=null; }
  switch(S.screen){
    case "auth": return renderAuth();
    case "mode": return renderMode();
    case "game": return renderGame();
  }
}
render();
</script>
