<style>

  .wrap{max-width:1080px;margin:0 auto;padding:0 16px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}
  .up{color:var(--up)} .down{color:var(--down)} .muted{color:var(--muted)} .gold{color:var(--gold)} .blue{color:var(--blue)}

  .btn-primary:disabled{opacity:.5}
  .pill{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:6px 12px}
  .field{width:100%;margin-top:8px;padding:13px 14px;border-radius:12px;background:var(--bg);

  .field:focus{border-color:var(--goldDim)}
  .center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .tag{font-size:11px;font-weight:800;letter-spacing:.18em;color:var(--gold)}
  .row{display:flex;align-items:center;justify-content:space-between}
  .badge{padding:2px 8px;border-radius:6px;font-size:12px;font-weight:800}
  .b-buy{background:rgba(255,92,92,.12);color:var(--buy)}
  .b-sell{background:rgba(43,214,115,.14);color:var(--sell)}
  .sm{font-size:12px} .lg{font-size:30px;font-weight:800}
  .stock-row,.news-row,.hold-row,.hist-row,.rank-row{border-top:1px solid var(--line);padding:12px 0}
  .tradebtn{padding:7px 13px;border-radius:9px;font-weight:800;font-size:14px;border:1px solid;transition:transform .05s}
  .tradebtn:active{transform:scale(.95)}
  .t-buy{background:rgba(255,92,92,.12);color:var(--buy);border-color:rgba(255,92,92,.28)}
  .t-sell{background:rgba(43,214,115,.12);color:var(--sell);border-color:rgba(43,214,115,.30)}
  .minibtn{padding:5px 10px;border-radius:8px;font-weight:700;font-size:12px;border:1px solid var(--line);color:var(--muted);background:var(--bg)}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;
    justify-content:center;padding:16px;z-index:50}
  .timerbar{height:4px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:10px}
  .timerbar > i{display:block;height:100%;background:var(--gold);transition:width 1s linear}
  .cols{display:grid;grid-template-columns:1.1fr 1fr;gap:16px}
  @media(max-width:760px){.cols{grid-template-columns:1fr}}
  .ghost{background:var(--bg);border:1px dashed var(--line);border-radius:12px;padding:22px;text-align:center;color:var(--muted)}
  .tier-chip{font-size:11px;font-weight:800;padding:2px 7px;border-radius:6px}
  .tier1{background:rgba(138,148,166,.15);color:var(--muted)}
  .tier2{background:rgba(245,182,66,.14);color:var(--gold)}
  .tier3{background:rgba(43,214,115,.14);color:var(--up)}
  .nav{position:sticky;top:0;z-index:20;background:rgba(14,17,22,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .navtab{padding:8px 14px;border-radius:10px;font-weight:700;font-size:14px}
  .navtab.on{background:var(--surface2);color:var(--text)}
  .navtab.off{color:var(--muted)}
  .spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto}
  @keyframes sp{to{transform:rotate(360deg)}}
  .newslock{filter:blur(4px);user-select:none}
  .roundbig{font-size:46px;font-weight:800;letter-spacing:-.02em}

/* 이자율: 사건에 따라 다양한 값(고정 아님) */
function rollRate(activeObjs){
  const up=activeObjs.some(e=>e.id==="rate_up"), down=activeObjs.some(e=>e.id==="rate_down");
  if(up)   return +rand(0.006,0.011).toFixed(4);
  if(down) return +rand(0.0005,0.0015).toFixed(4);
  return +rand(0.002,0.004).toFixed(4);
}
/* 뉴스 생성 (단계/신문사/헛소문 포함, id 부여) */
function buildNews(activeObjs, rate){
  const used=activeObjs.map(e=>e.id), news=[]; let id=0;
  activeObjs.forEach(ev=>{
    news.push({id:id++, tier:3, company:pick(COMPANIES.slice(0,3)), text:pick(ev.t3)});
    news.push({id:id++, tier:2, company:pick(COMPANIES.slice(0,3)), text:pick(ev.t2)});
    news.push({id:id++, tier:1, company:pick(COMPANIES),          text:pick(ev.t1)});
  });
  EVENTS.filter(e=>!used.includes(e.id)).sort(()=>Math.random()-.5).slice(0,1+Math.floor(Math.random()*2))
    .forEach(ev=> news.push({id:id++, tier:1, company:"루머스", text:pick(ev.t1)}));
  if(Math.random()<0.5){ const w=rate>0.004?"오르는":rate<0.002?"내리는":"잠잠한";
    news.push({id:id++, tier:2, company:pick(["한경데일리","머니투데이"]),
      text:`은행 예금 금리, 최근 ${w} 분위기 — 현재 라운드당 약 ${(rate*100).toFixed(1)}% 수준`}); }
  for(let i=news.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [news[i],news[j]]=[news[j],news[i]]; }
  return news;
}
/* 사건 1~2개 선택 (직전과 다르게) */
function pickEvents(lastIds){
  let active;
  for(let tn=0;tn<6;tn++){
    const n=Math.random()<0.5?1:2, pool=[...EVENTS]; active=[];
    for(let i=0;i<n;i++) active.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);
    const ids=active.map(e=>e.id).sort().join(",");
    if(ids!==(lastIds||[]).slice().sort().join(",")) break;
  }
  return active;
}

function translateAuthError(m){

  if(/already registered|already exists/i.test(m)) return "이미 가입된 이메일입니다.";
  if(/Email not confirmed/i.test(m)) return "이메일 확인이 필요합니다.";

}

async function startGame(mode){
  S.gameMode = mode==="speed" ? "speed" : "solo";
  const tickLen = S.gameMode==="speed" ? SPEED_TICK : TICK_SECONDS;
  S.screen="loading"; render();
  await loadAllSaves();
  let st = savesCache[S.gameMode];
  if(st && st.market){ G=st; if(G.bank==null)G.bank=0; if(G.rate==null)G.rate=0.003; G.cash=Math.round(G.cash); G.bank=Math.round(G.bank); if(!G.events||!G.events.length) rollMarket(); }
  else { G={ cash:START_CASH, bank:0, rate:0.003, holdings:{}, history:[],
        market:STOCKS.map(s=>({...s, prev:s.p, base:s.p})), events:[], news:[], lastEventIds:[], timeLeft:tickLen }; rollMarket(); }
  G.tickLen=tickLen; G.timeLeft=Math.min(G.timeLeft||tickLen, tickLen);
  savesCache[S.gameMode]=G;
  S.tab="stocks"; S.screen="game"; render();
  clearInterval(timer); timer=setInterval(tick,1000);
}
function soloNetWorth(){ let v=G.cash+(G.bank||0); for(const[t,h] of Object.entries(G.holdings)){ const s=G.market.find(x=>x.t===t); if(s)v+=s.p*h.shares; } return v; }
function rollMarket(){
  const active=pickEvents(G.lastEventIds); G.events=active; G.lastEventIds=active.map(e=>e.id);
  G.rate=rollRate(active);
  G.news=buildNews(active, G.rate);
}
function tick(){ if(!G)return; G.timeLeft--; if(G.timeLeft<=0){ marketTick(); return; }
  const el=$("timer"); if(el) el.textContent=fmtTime(G.timeLeft);
  const bar=$("timerfill"); if(bar) bar.style.width=(G.timeLeft/G.tickLen*100)+"%"; }
function fmtTime(s){ return `0:${String(s).padStart(2,"0")}`; }
function marketTick(){
  const evs=G.events.map(e=>EVENTS.find(x=>x.id===e.id)).filter(Boolean);
  const useObjs = G.events[0] && G.events[0].impact ? G.events : evs;
  G.market.forEach(s=>{ let d=0; useObjs.forEach(ev=>{ if(ev.impact[s.sector]!=null) d+=ev.impact[s.sector]; }); d+=rand(-0.04,0.04); s.prev=s.p; s.p=Math.max(0,s.p*(1+d)); });
  if(G.bank>0) G.bank=Math.round(G.bank*(1+G.rate));
  rollMarket(); G.timeLeft=G.tickLen; saveGameBg(); render();
}
async function exitGame(){ if(!confirm("나가시겠어요? 진행 상황은 저장됩니다."))return; S.screen="loading"; render(); try{await saveGame();}catch(e){} clearInterval(timer); timer=null; S.screen="mode"; render(); }
function execute(t,side,qty){
  const s=G.market.find(x=>x.t===t); if(!s||qty<=0)return; const cost=Math.round(s.p*qty);
  if(side==="buy"){ if(G.cash<cost){alert("현금이 부족합니다.");return;} G.cash-=cost; const h=G.holdings[t]||{shares:0,avgCost:0}; const ns=h.shares+qty; h.avgCost=(h.avgCost*h.shares+cost)/ns; h.shares=ns; G.holdings[t]=h; }
  else { const h=G.holdings[t]; if(!h||h.shares<qty){alert("보유 수량이 부족합니다.");return;} G.cash+=cost; h.shares-=qty; if(h.shares===0)delete G.holdings[t]; else G.holdings[t]=h; }
  G.history.unshift({id:Date.now(),t,side,qty,price:s.p,at:Date.now()}); G.history=G.history.slice(0,40);
  closeModal(); saveGameBg(); render();
}
function deposit(amt){ amt=Math.floor(amt); if(!amt||amt<=0)return; if(G.cash<amt){alert("현금이 부족합니다.");return;} G.cash-=amt; G.bank=(G.bank||0)+amt; saveGameBg(); render(); }
function withdraw(amt){ amt=Math.floor(amt); if(!amt||amt<=0)return; if((G.bank||0)<amt){alert("예치금이 부족합니다.");return;} G.bank-=amt; G.cash+=amt; saveGameBg(); render(); }

function bindGamble(){
  document.querySelectorAll(".navtab[data-gg]").forEach(b=>b.onclick=()=>{ S.gambleGame=b.dataset.gg; render(); });

function gambleCheck(bet){ if(!bet||bet<=0){ alert("베팅 금액을 입력하세요."); return false; } if(G.cash<bet){ alert("현금이 부족합니다."); return false; } return true; }
function playCoin(side){
  const bet=Math.floor(+($("betAmt")?.value||0)); if(!gambleCheck(bet)) return;
  const face=Math.random()<0.5?"앞":"뒤", win=face===side;
  G.cash += win?bet:-bet; S.gambleResult={ win, delta:win?bet:-bet, label:`동전 결과 ${face}면 · 내 선택 ${side}면` };
  saveGameBg(); render();
}
function playDice(num){
  const bet=Math.floor(+($("betAmt")?.value||0)); if(!gambleCheck(bet)) return;
  const roll=1+Math.floor(Math.random()*6), win=roll===num;
  G.cash += win?bet*4:-bet; S.gambleResult={ win, delta:win?bet*4:-bet, label:`주사위 결과 ${roll} · 내 선택 ${num}` };
  saveGameBg(); render();
}

   =================================================================== */
function onRoomUpdate(room){
  S.room=room;
  if(room.status==="ended"){ alert("방장이 방을 닫았습니다."); leaveRoomLocal(); return; }
  if(room.status==="finished"){ if(mpTimer){clearInterval(mpTimer);mpTimer=null;} S.screen="mp_result"; render(); return; }
  if(room.status==="playing"){
    const g=room.game;
    if(S.screen!=="mp_game"){ enterMpGame(); return; }
    if(g && g.result && g.result.round>mpLastSettled){      // 라운드 정산(이자/대출이자)
      if(MP){
        if(MP.bank>0) MP.bank = Math.round(MP.bank*(1+(g.endedRate||g.rate)));
        if(MP.loanPrincipal>0) MP.loanInterest += Math.round(MP.loanPrincipal*LOAN_RATE);
        mpSavePortfolio();
      }
      mpLastSettled=g.result.round;
    }
    render(); return;
  }
  if(S.screen==="mp_room") render();
}
async function startMpGame(){
  const rounds=+(($("roundSel")&&$("roundSel").value)||10);
  const secs=+(($("secSel")&&$("secSel").value)||30);
  const g={ round:1, total:rounds, roundSeconds:secs, phase:"intro", result:null, endedRate:null,
            market:STOCKS.map(s=>({t:s.t,p:s.p,prev:s.p})), lastIds:[] };
  const active=pickEvents(g.lastIds); g.lastIds=active.map(e=>e.id); g.rate=rollRate(active); g.events=g.lastIds; g.news=buildNews(active,g.rate);
  g.endsAt=serverNow()+RESULT_SECONDS*1000;
  await sb.from("rooms").update({ status:"playing", total_rounds:rounds, game:g }).eq("id",S.room.id);
  S.room.status="playing"; S.room.game=g; await enterMpGame();
}
async function enterMpGame(){
  await syncClock();
  await mpLoadPortfolio();
  mpLastSettled = S.room.game.result ? S.room.game.result.round : 0;
  if(!mpTimer) mpTimer=setInterval(mpTick,1000);
  S.mpTab="stocks"; S.screen="mp_game"; render();
}
function mpTick(){
  const g=S.room&&S.room.game; if(!g||S.room.status!=="playing") return;
  if(S.isHost && serverNow()>=g.endsAt){ mpAdvance(); return; }
  const left=Math.max(0,Math.ceil((g.endsAt-serverNow())/1000));
  const a=$("mtimer"); if(a) a.textContent=fmtTime(left);
  const b=$("mtimerfill"); if(b){ const span=(g.phase==="live"?g.roundSeconds:RESULT_SECONDS)*1000; b.style.width=Math.max(0,Math.min(100,(g.endsAt-serverNow())/span*100))+"%"; }
  const c=$("introtimer"); if(c) c.textContent=left+"초";
}
async function mpAdvance(){
  const g=JSON.parse(JSON.stringify(S.room.game));
  if(g.phase==="intro"){ g.phase="live"; g.endsAt=serverNow()+g.roundSeconds*1000; S.room.game=g; await sb.from("rooms").update({game:g}).eq("id",S.room.id); return; }
  // live 종료 → 시세 변동 + 결과 집계
  const evs=g.events.map(id=>EVENTS.find(e=>e.id===id)).filter(Boolean);
  g.market.forEach(s=>{ const sec=stockSector(s.t); let d=0; evs.forEach(ev=>{ if(ev.impact[sec]!=null) d+=ev.impact[sec]; }); d+=rand(-0.04,0.04); s.prev=s.p; s.p=Math.max(0,s.p*(1+d)); });
  let upS=null,dnS=null; g.market.forEach(s=>{ const p=(s.p-s.prev)/s.prev; if(!upS||p>upS.pct)upS={t:s.t,pct:p}; if(!dnS||p<dnS.pct)dnS={t:s.t,pct:p}; });
  let leader=null; (S.players||[]).forEach(pl=>{ const nw=playerAssets(pl); if(!leader||nw>leader.nw)leader={nick:pl.nickname,nw}; });
  g.result={ round:g.round, topUp:upS, topDown:dnS, leader };
  g.endedRate=g.rate;
  if(g.round>=g.total){ await sb.from("rooms").update({status:"finished",game:g}).eq("id",S.room.id); S.room.status="finished"; S.room.game=g; if(mpTimer){clearInterval(mpTimer);mpTimer=null;} S.screen="mp_result"; render(); return; }
  g.round++;
  const active=pickEvents(g.lastIds); g.lastIds=active.map(e=>e.id); g.events=g.lastIds; g.rate=rollRate(active); g.news=buildNews(active,g.rate);
  g.phase="intro"; g.endsAt=serverNow()+RESULT_SECONDS*1000;
  S.room.game=g; await sb.from("rooms").update({game:g}).eq("id",S.room.id);
}
/* 내 지갑 */
async function mpLoadPortfolio(){
  const { data }=await sb.from("room_players").select("cash,bank,holdings,coins,loan_principal,loan_interest,bought").eq("room_id",S.room.id).eq("user_id",S.user.id).maybeSingle();
  MP = data ? { cash:Number(data.cash), bank:Number(data.bank||0), holdings:data.holdings||{}, coins:data.coins==null?START_COINS:Number(data.coins),
                loanPrincipal:Number(data.loan_principal||0), loanInterest:Number(data.loan_interest||0), bought:data.bought||{round:0,ids:[]} }
            : { cash:START_CASH, bank:0, holdings:{}, coins:START_COINS, loanPrincipal:0, loanInterest:0, bought:{round:0,ids:[]} };
}
async function mpSavePortfolio(){
  if(!MP) return;
  try{ await sb.from("room_players").update({ cash:Math.round(MP.cash), bank:Math.round(MP.bank), holdings:MP.holdings, coins:MP.coins,
    loan_principal:Math.round(MP.loanPrincipal), loan_interest:Math.round(MP.loanInterest), bought:MP.bought })
    .eq("room_id",S.room.id).eq("user_id",S.user.id); }catch(e){}
}
function mpAssets(pf){ let v=Number(pf.cash||0)+Number(pf.bank||0); const g=S.room.game; for(const[t,h] of Object.entries(pf.holdings||{})){ const s=g.market.find(x=>x.t===t); if(s&&h)v+=s.p*h.shares; } return v; }
function mpRankWorth(){ return mpAssets(MP)-(MP.loanInterest||0); }
function playerAssets(pl){ let v=Number(pl.cash||0)+Number(pl.bank||0); const g=S.room.game; for(const[t,h] of Object.entries(pl.holdings||{})){ const s=g.market.find(x=>x.t===t); if(s&&h)v+=s.p*h.shares; } return v; }
function playerRankWorth(pl){ return playerAssets(pl)-Number(pl.loan_interest||0); }
function mpExecute(t,side,qty){
  const g=S.room.game; if(g.phase!=="live"){ alert("라운드 시작 후에 거래할 수 있어요."); return; }
  const s=g.market.find(x=>x.t===t); if(!s||qty<=0)return; const cost=Math.round(s.p*qty);
  if(side==="buy"){ if(MP.cash<cost){alert("현금이 부족합니다.");return;} MP.cash-=cost; const h=MP.holdings[t]||{shares:0,avgCost:0}; const ns=h.shares+qty; h.avgCost=(h.avgCost*h.shares+cost)/ns; h.shares=ns; MP.holdings[t]=h; }
  else { const h=MP.holdings[t]; if(!h||h.shares<qty){alert("보유 수량이 부족합니다.");return;} MP.cash+=cost; h.shares-=qty; if(h.shares===0)delete MP.holdings[t]; else MP.holdings[t]=h; }
  closeModal(); mpSavePortfolio(); render();
}
function mpDeposit(amt){ amt=Math.floor(amt); if(!amt||amt<=0)return; if(MP.cash<amt){alert("현금이 부족합니다.");return;} MP.cash-=amt; MP.bank+=amt; mpSavePortfolio(); render(); }
function mpWithdraw(amt){ amt=Math.floor(amt); if(!amt||amt<=0)return; if(MP.bank<amt){alert("예치금이 부족합니다.");return;} MP.bank-=amt; MP.cash+=amt; mpSavePortfolio(); render(); }
function mpBorrow(amt){ amt=Math.floor(amt); if(!amt||amt<=0)return; const cg=creditGrade(mpAssets(MP)); if(MP.loanPrincipal+amt>cg.limit){alert("대출 한도를 초과합니다.");return;} MP.loanPrincipal+=amt; MP.cash+=amt; mpSavePortfolio(); render(); }
function mpRepayAll(){ const debt=MP.loanPrincipal+MP.loanInterest; if(debt<=0){alert("상환할 대출이 없습니다.");return;} if(MP.cash<debt){alert("현금이 부족합니다.");return;} MP.cash-=debt; MP.loanPrincipal=0; MP.loanInterest=0; mpSavePortfolio(); render(); }
function mpBuyNews(id){
  const g=S.room.game; const n=g.news.find(x=>x.id===id); if(!n)return;
  if(!MP.bought||MP.bought.round!==g.round) MP.bought={round:g.round,ids:[]};
  if(MP.bought.ids.includes(id)) return;
  const cost=NEWS_COST[n.tier]; if((MP.coins||0)<cost){ alert("코인이 부족합니다."); return; }
  MP.coins-=cost; MP.bought.ids.push(id); mpSavePortfolio(); render();
}

function renderMpGame(){
  const g=S.room.game;
  if(g.phase==="intro"){ renderMpIntro(); return; }
  S.mpTab=S.mpTab||"stocks";
  const tabs=[["stocks","주식"],["bank","은행"],["rank","랭킹"]];
  const nav=`<div class="nav"><div class="wrap row" style="padding:10px 16px">
    <div style="display:flex;align-items:center;gap:10px"><span class="tag">방 ${S.room.code}</span>
      <div style="display:flex;gap:4px">${tabs.map(([id,l])=>`<button class="navtab ${S.mpTab===id?'on':'off'}" data-mtab="${id}">${l}</button>`).join("")}</div></div>
    <button id="leave2" class="pill sm muted">나가기</button></div></div>`;
  let content;
  if(S.mpTab==="rank") content=mpRankView();
  else if(S.mpTab==="bank") content=mpBankView();
  else content=mpStocksView();
  $("app").innerHTML=nav+`<div class="wrap" style="padding-top:14px;padding-bottom:40px">${content}</div>`;
  document.querySelectorAll(".navtab").forEach(b=>b.onclick=()=>{ S.mpTab=b.dataset.mtab; render(); });
  $("leave2").onclick=leaveRoom;
  if(S.mpTab==="stocks") mpBindStocks();
  else if(S.mpTab==="bank") bindBankPanel(true);
}
function renderMpIntro(){
  const g=S.room.game, r=g.result, left=Math.max(0,Math.ceil((g.endsAt-serverNow())/1000));
  let resHtml="";
  if(r){ const u=r.topUp,d=r.topDown,l=r.leader;
    resHtml=`<div class="card" style="padding:18px;margin-top:18px;text-align:left">
      <div class="muted sm" style="margin-bottom:8px">지난 ${r.round}라운드 결과</div>
      <div class="row" style="margin-bottom:6px"><span class="up">▲ 최고 상승</span><span class="mono">${esc(stockName(u.t))} ${pct(u.pct)}</span></div>
      <div class="row" style="margin-bottom:6px"><span class="down">▼ 최고 하락</span><span class="mono">${esc(stockName(d.t))} ${pct(d.pct)}</span></div>
      ${l?`<div class="row"><span class="gold">👑 선두</span><span class="mono">${esc(l.nick)} · ₩${won(l.nw)}</span></div>`:""}</div>`; }
  $("app").innerHTML=`<div class="center"><div style="width:100%;max-width:420px;text-align:center">
    <div class="tag">ROUND</div><div class="roundbig">라운드 ${g.round}</div>
    <div class="muted sm" style="margin-top:6px">잠시 후 시작 · <span id="introtimer">${left}초</span></div>
    ${resHtml}
    <button id="leaveIntro" class="pill muted sm" style="margin-top:18px;width:100%;padding:12px">방 나가기</button></div></div>`;
  $("leaveIntro").onclick=leaveRoom;
}
function mpStocksView(){
  const g=S.room.game; if(!g||!MP) return `<div class="ghost">불러오는 중…</div>`;
  const total=mpAssets(MP), pl=total-START_CASH, plp=pl/START_CASH, up=pl>=0, left=Math.max(0,Math.ceil((g.endsAt-serverNow())/1000));
  return `<div class="row" style="flex-wrap:wrap;gap:10px;margin-bottom:10px">
    <div><div class="muted sm">내 자산 · 현금 ₩${won(MP.cash)} · 🪙${MP.coins} · 라운드 ${g.round}/${g.total}</div>
      <div style="display:flex;align-items:baseline;gap:12px"><span class="mono lg">₩${won(total)}</span><span class="mono ${up?'up':'down'}">${pct(plp)}</span></div></div>
    <div style="text-align:right"><div class="mono" style="font-size:22px;font-weight:800" id="mtimer">${fmtTime(left)}</div><div class="muted sm">⏱ 라운드 종료까지</div></div></div>
    <div class="timerbar"><i id="mtimerfill" style="width:${left/g.roundSeconds*100}%"></i></div>
    <div class="cols" style="margin-top:14px"><div>${marketCard(true)}${holdingsCard(true)}</div><div>${mpNewsCard()}</div></div>`;
}
function mpBindStocks(){
  S.room.game.market.forEach(s=>{ const b=$("mbuy-"+s.t), sl=$("msell-"+s.t); if(b)b.onclick=()=>openTrade(s.t,"buy",true); if(sl)sl.onclick=()=>openTrade(s.t,"sell",true);
    const hb=$("mhbuy-"+s.t), hs=$("mhsell-"+s.t); if(hb)hb.onclick=()=>openTrade(s.t,"buy",true); if(hs)hs.onclick=()=>openTrade(s.t,"sell",true); });
  G_bindNews();
}
function G_bindNews(){ (S.room.game.news||[]).forEach(n=>{ const el=$("mnews-"+n.id); if(el) el.onclick=()=>mpBuyNews(n.id); }); }
function mpBankView(){ return `<div style="max-width:520px;margin:0 auto">${bankPanel(MP.cash,MP.bank,S.room.game.rate,true)}</div>`; }
function mpNewsCard(){
  const g=S.room.game, tl={1:"1단계",2:"2단계",3:"3단계"};
  return `<div class="card" style="padding:18px;margin-bottom:16px">
    <div class="row" style="margin-bottom:6px"><b>뉴스</b><span class="muted sm">🪙 ${MP.coins} · 코인으로 구매</span></div>
    ${(g.news||[]).map(n=>{ const owned=MP.bought&&MP.bought.round===g.round&&MP.bought.ids.includes(n.id); const cost=NEWS_COST[n.tier];
      return `<div class="news-row"><div class="row"><div style="display:flex;align-items:center;gap:7px">
        <span class="tier-chip tier${n.tier}">${tl[n.tier]}</span><span class="muted sm">${n.company}</span></div>
        ${owned?'<span class="up sm">구매됨</span>':`<button id="mnews-${n.id}" class="pill sm gold">🔓 ${cost}코인</button>`}</div>
        <div style="margin-top:7px;font-size:14px;line-height:1.5" class="${owned?'':'newslock'}">${owned?n.text:"█████████ ████ ██████ ███████"}</div></div>`; }).join("")}</div>`;
}
function mpRankListHtml(){
  const rows=(S.players||[]).map(p=>{ const me=p.user_id===S.user.id; return { nick:p.nickname, uid:p.user_id, nw: me?mpRankWorth():playerRankWorth(p) }; }).sort((a,b)=>b.nw-a.nw);
  const medal=i=>["🥇","🥈","🥉"][i]||`${i+1}`;
  return rows.map((r,i)=>{ const me=r.uid===S.user.id; return `<div class="row rank-row" style="${me?'background:rgba(245,182,66,.06);border-radius:8px':''}">
    <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;text-align:center;font-weight:800">${medal(i)}</span><b>${esc(r.nick)}${me?' (나)':''}</b></div>
    <span class="mono ${r.nw>=START_CASH?'up':'down'}">₩${won(r.nw)}</span></div>`; }).join("");
}
function mpRankView(){ return `<div class="card" style="padding:18px"><div class="row" style="margin-bottom:6px"><b>실시간 순위</b><span class="muted sm">대출 이자는 순위에서 차감</span></div><div id="mpRankList">${mpRankListHtml()}</div></div>`; }
function renderMpResult(){
  const rows=(S.players||[]).map(p=>{ const me=p.user_id===S.user.id; return { nick:p.nickname, uid:p.user_id, nw: me?mpRankWorth():playerRankWorth(p) }; }).sort((a,b)=>b.nw-a.nw);
  const myRank=rows.findIndex(r=>r.uid===S.user.id)+1, medal=i=>["🥇","🥈","🥉"][i]||`${i+1}`;
  $("app").innerHTML=`<div class="center"><div style="width:100%;max-width:440px;text-align:center">
    <div class="tag">게임 종료</div><div style="font-size:44px;margin:10px 0">${myRank===1?'👑':'🏁'}</div>
    <div style="font-size:18px;font-weight:800">최종 순위 ${myRank}위 / ${rows.length}명</div>
    <div class="card" style="padding:18px;margin-top:18px;text-align:left">${rows.map((r,i)=>{ const me=r.uid===S.user.id;
      return `<div class="row rank-row" style="${me?'background:rgba(245,182,66,.06);border-radius:8px':''}">
        <div style="display:flex;align-items:center;gap:10px"><span style="width:24px;text-align:center;font-weight:800">${medal(i)}</span><b>${esc(r.nick)}${me?' (나)':''}</b></div>
        <span class="mono ${r.nw>=START_CASH?'up':'down'}">₩${won(r.nw)}</span></div>`; }).join("")}</div>
    <button id="leave3" class="btn-primary" style="margin-top:20px">나가기</button></div></div>`;
  $("leave3").onclick=leaveRoom;
}

/* ===================================================================
   라우터
   =================================================================== */
function render(){
  if(S.screen!=="game"){ clearInterval(timer); timer=null; }
  switch(S.screen){
    case "config":  return renderConfig();
    case "loading": return renderLoading();
    case "auth":    return renderAuth();
    case "mode":    return renderMode();
    case "mp_entry":return renderMpEntry();
    case "mp_room": return renderMpRoom();
    case "mp_game": return renderMpGame();
    case "mp_result": return renderMpResult();
    case "game":    return renderGame();
  }
}
boot();
</script>
