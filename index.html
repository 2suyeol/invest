<style>
  :root{
    --bg:#0E1116; --surface:#161B22; --surface2:#1C232E; --line:#262E3A;

    --gold:#F5B642; --goldDim:#5A4A1E; --blue:#5B9DF5;

  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);min-height:100vh;
    font-family:"Pretendard",system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:ui-monospace,"SFMono-Regular",Menlo,monospace;font-variant-numeric:tabular-nums}
  .wrap{max-width:1080px;margin:0 auto;padding:0 16px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}
  .up{color:var(--up)} .down{color:var(--down)} .muted{color:var(--muted)} .gold{color:var(--gold)} .blue{color:var(--blue)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px}
  .btn-primary{background:var(--gold);color:#1A1407;font-weight:800;border-radius:12px;padding:14px;width:100%;transition:transform .05s}
  .btn-primary:active{transform:scale(.97)}
  .btn-primary:disabled{opacity:.5}
  .pill{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:6px 12px}
  .field{width:100%;margin-top:8px;padding:13px 14px;border-radius:12px;background:var(--bg);
    border:1px solid var(--line);color:var(--text);font-size:15px;outline:none}
  .field:focus{border-color:var(--goldDim)}
  .center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .tag{font-size:11px;font-weight:800;letter-spacing:.18em;color:var(--gold)}
  .row{display:flex;align-items:center;justify-content:space-between}
  .badge{padding:2px 8px;border-radius:6px;font-size:12px;font-weight:800}
  .b-buy{background:rgba(43,214,115,.12);color:var(--up)}
  .b-sell{background:rgba(255,92,92,.12);color:var(--down)}
  .sm{font-size:12px} .lg{font-size:30px;font-weight:800}
  .stock-row,.news-row,.hold-row,.hist-row,.rank-row{border-top:1px solid var(--line);padding:12px 0}
  .tradebtn{padding:7px 13px;border-radius:9px;font-weight:800;font-size:14px;border:1px solid;transition:transform .05s}
  .tradebtn:active{transform:scale(.95)}
  .t-buy{background:rgba(43,214,115,.12);color:var(--up);border-color:rgba(43,214,115,.25)}
  .t-sell{background:rgba(255,92,92,.12);color:var(--down);border-color:rgba(255,92,92,.25)}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;
    justify-content:center;padding:16px;z-index:50}
  .timerbar{height:4px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:10px}
  .timerbar > i{display:block;height:100%;background:var(--gold);transition:width 1s linear}
  .cols{display:grid;grid-template-columns:1.1fr 1fr;gap:16px}
  @media(max-width:760px){.cols{grid-template-columns:1fr}}
  .ghost{background:var(--bg);border:1px dashed var(--line);border-radius:12px;padding:22px;text-align:center;color:var(--muted)}
  .tier-chip{font-size:11px;font-weight:800;padding:2px 7px;border-radius:6px}
  .tier1{background:rgba(138,148,166,.15);color:var(--muted)}
  .tier2{background:rgba(245,182,66,.14);color:var(--gold)}
  .tier3{background:rgba(43,214,115,.14);color:var(--up)}
  .nav{position:sticky;top:0;z-index:20;background:rgba(14,17,22,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line)}
  .navtab{padding:8px 14px;border-radius:10px;font-weight:700;font-size:14px}
  .navtab.on{background:var(--surface2);color:var(--text)}
  .navtab.off{color:var(--muted)}
  .spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--gold);
    border-radius:50%;animation:sp 1s linear infinite;margin:0 auto}
  @keyframes sp{to{transform:rotate(360deg)}}

</head>

async function boot(){
  if(!CONFIGURED){ S.screen="config"; render(); return; }
  S.screen="loading"; render();
  try{
    const { data } = await sb.auth.getSession();
    if(data.session){ await onLoggedIn(data.session.user); return; }
  }catch(e){}
  S.screen="auth"; render();
}

async function doAuth(){
  const err=$("auth-err");
  const email=$("in-email").value.trim();
  const pw=$("in-pw").value;
  const nick=S.authTab==="signup" ? $("in-nick").value.trim() : null;
  if(!email.includes("@")){ err.textContent="올바른 이메일을 입력하세요."; return; }
  if(pw.length<6){ err.textContent="비밀번호는 6자 이상이어야 합니다."; return; }
  if(S.authTab==="signup" && nick.length<2){ err.textContent="닉네임은 2자 이상이어야 합니다."; return; }
  busy=true; renderAuth();
  try{
    if(S.authTab==="signup"){
      const { data, error } = await sb.auth.signUp({ email, password:pw, options:{ data:{ nickname:nick } } });
      if(error) throw error;
      if(data.session){ await onLoggedIn(data.session.user); return; }
      // 이메일 확인이 켜져 있는 경우
      busy=false; S.authTab="login"; renderAuth();
      $("auth-err").textContent="가입 완료! 이메일 확인이 켜져 있으면 메일 확인 후 로그인하세요. (Supabase 설정에서 'Confirm email'을 끄면 즉시 로그인됩니다)";
      return;
    } else {
      const { data, error } = await sb.auth.signInWithPassword({ email, password:pw });
      if(error) throw error;
      await onLoggedIn(data.user); return;
    }
  }catch(e){
    busy=false; renderAuth();
    $("auth-err").textContent = translateAuthError(e.message||"오류가 발생했습니다.");
  }
}
function translateAuthError(m){
  if(/Invalid login/i.test(m)) return "이메일 또는 비밀번호가 올바르지 않습니다.";
  if(/already registered|already exists/i.test(m)) return "이미 가입된 이메일입니다.";
  if(/Email not confirmed/i.test(m)) return "이메일 확인이 필요합니다. (또는 Supabase에서 확인 끄기)";
  return m;
}

async function onLoggedIn(user){
  S.user = user;
  S.nickname = (user.user_metadata && user.user_metadata.nickname) || user.email.split("@")[0];
  // 랭킹용 점수 행이 없으면 생성(있으면 건드리지 않음)
  try{
    await sb.from("scores").upsert(
      { id:user.id, nickname:S.nickname },
      { onConflict:"id", ignoreDuplicates:true }
    );
  }catch(e){}
  busy=false; S.screen="mode"; render();
}

async function logout(){
  if(rtChannel){ try{ sb.removeChannel(rtChannel); }catch(e){} rtChannel=null; }
  try{ await saveGame(true); }catch(e){}
  clearInterval(timer); timer=null; G=null;
  try{ await sb.auth.signOut(); }catch(e){}
  S.user=null; S.nickname=null; S.screen="auth"; render();
}

/* ===================================================================
   데이터 (저장 / 불러오기 / 랭킹)
   =================================================================== */
async function loadSave(){
  const { data } = await sb.from("saves").select("state").eq("id",S.user.id).maybeSingle();
  return data ? data.state : null;
}
async function saveGame(){
  if(!G||!S.user) return;
  G.netWorth = netWorth();
  const now = new Date().toISOString();
  await sb.from("saves").upsert({ id:S.user.id, state:G, updated_at:now });
  await sb.from("scores").upsert({ id:S.user.id, nickname:S.nickname, net_worth:Math.round(G.netWorth), updated_at:now });
}
function saveGameBg(){ saveGame().catch(()=>{}); }   // 화면 막지 않는 백그라운드 저장
async function fetchLeaderboard(){
  const { data } = await sb.from("scores").select("nickname,net_worth").order("net_worth",{ascending:false}).limit(50);
  return data || [];
}

async function createRoom(){
  S.screen="loading"; render();
  let room=null, tries=0;
  while(tries++<5){
    const { data, error } = await sb.from("rooms")
      .insert({ code:genCode(), host_id:S.user.id, status:"waiting", total_rounds:10 })
      .select().single();

  }
  if(!room){ alert("방 생성에 실패했습니다. SQL(테이블/권한)이 적용됐는지 확인해주세요."); S.screen="mp_entry"; render(); return; }
  await sb.from("room_players").insert({ room_id:room.id, user_id:S.user.id, nickname:S.nickname });
  S.room=room; S.isHost=true;
  await enterRoom();
}
async function joinRoom(code){
  const errEl=$("join-err");
  if(!code){ if(errEl) errEl.textContent="코드를 입력하세요."; return; }
  const { data:room } = await sb.from("rooms").select("*").eq("code",code).maybeSingle();
  if(!room){ if(errEl) errEl.textContent="그런 코드의 방이 없습니다."; return; }
  if(room.status!=="waiting"){ if(errEl) errEl.textContent="이미 시작했거나 종료된 방입니다."; return; }
  S.screen="loading"; render();
  await sb.from("room_players").upsert({ room_id:room.id, user_id:S.user.id, nickname:S.nickname }, { onConflict:"room_id,user_id" });
  S.room=room; S.isHost=(room.host_id===S.user.id);
  await enterRoom();
}

  const { data } = await sb.from("room_players").select("user_id,nickname,joined_at").eq("room_id",S.room.id).order("joined_at");

}
function subscribeRoom(roomId){
  if(rtChannel){ sb.removeChannel(rtChannel); rtChannel=null; }
  rtChannel = sb.channel("room-"+roomId)
    .on("postgres_changes",{event:"*",schema:"public",table:"room_players",filter:"room_id=eq."+roomId}, ()=>refreshPlayers())
    .on("postgres_changes",{event:"UPDATE",schema:"public",table:"rooms",filter:"id=eq."+roomId}, p=>onRoomUpdate(p.new))
    .subscribe();
}
function onRoomUpdate(room){
  S.room=room;
  if(room.status==="playing"){ S.screen="mp_game"; render(); }

   게임 시작 / 엔진
   =================================================================== */
async function startGame(){
  S.screen="loading"; render();
  let st=null;
  try{ st=await loadSave(); }catch(e){}
  if(st && st.market){
    G=st;
    if(G.bank==null) G.bank=0;
    if(G.rate==null) G.rate=BASE_RATE;
    if(!G.events||!G.events.length) rollMarket();
  } else {
    G={ cash:START_CASH, bank:0, rate:BASE_RATE, holdings:{}, history:[],
        market:STOCKS.map(s=>({...s, prev:s.p, base:s.p})),
        events:[], news:[], lastEventIds:[], timeLeft:TICK_SECONDS };
    rollMarket();
  }
  S.tab="stocks"; S.screen="game"; render();
  clearInterval(timer); timer=setInterval(tick,1000);
}
function netWorth(){
  let v=G.cash+(G.bank||0);
  for(const[t,h] of Object.entries(G.holdings)){
    const s=G.market.find(x=>x.t===t); if(s) v+=s.p*h.shares;
  }
  return v;
}
function rollMarket(){
  let active;
  for(let tryN=0; tryN<6; tryN++){
    const n=Math.random()<0.5?1:2;
    const pool=[...EVENTS]; active=[];
    for(let i=0;i<n;i++) active.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);
    const ids=active.map(e=>e.id).sort().join(",");
    if(ids!==(G.lastEventIds||[]).slice().sort().join(",")) break;
  }
  G.events=active; G.lastEventIds=active.map(e=>e.id);
  let r=BASE_RATE;
  active.forEach(ev=>{ if(ev.id==="rate_up") r=0.006; else if(ev.id==="rate_down") r=0.001; });
  G.rate=r;
  const used=active.map(e=>e.id), news=[]; let nid=0;
  active.forEach(ev=>{
    news.push({id:nid++, tier:3, company:pick(COMPANIES.slice(0,3)), text:pick(ev.t3)});
    news.push({id:nid++, tier:2, company:pick(COMPANIES.slice(0,3)), text:pick(ev.t2)});
    news.push({id:nid++, tier:1, company:pick(COMPANIES),          text:pick(ev.t1)});
  });
  EVENTS.filter(e=>!used.includes(e.id)).sort(()=>Math.random()-.5).slice(0,1+Math.floor(Math.random()*2))
    .forEach(ev=> news.push({id:nid++, tier:1, company:"루머스", text:pick(ev.t1)}));
  if(Math.random()<0.5){
    const word=G.rate>BASE_RATE?"오르는":G.rate<BASE_RATE?"내리는":"잠잠한";
    news.push({id:nid++, tier:2, company:pick(["한경데일리","머니투데이"]),
      text:`은행 예금 금리, 최근 ${word} 분위기 — 현재 분당 약 ${(G.rate*100).toFixed(1)}% 수준`});
  }
  G.news=news.sort(()=>Math.random()-.5);
}
function tick(){
  if(!G) return;
  G.timeLeft--;
  if(G.timeLeft<=0){ marketTick(); return; }
  const el=$("timer"); if(el) el.textContent=fmtTime(G.timeLeft);
  const bar=$("timerfill"); if(bar) bar.style.width=(G.timeLeft/TICK_SECONDS*100)+"%";
}
function fmtTime(s){ return `0:${String(s).padStart(2,"0")}`; }
function marketTick(){
  G.market.forEach(s=>{
    let delta=0;
    G.events.forEach(ev=>{ if(ev.impact[s.sector]!=null) delta+=ev.impact[s.sector]; });
    delta+=rand(-0.04,0.04);
    s.prev=s.p; s.p=Math.max(0.5, s.p*(1+delta));
  });
  if(G.bank>0) G.bank += G.bank*G.rate;
  rollMarket();
  G.timeLeft=TICK_SECONDS;
  saveGameBg();
  render();
}
async function exitGame(){
  if(!confirm("나가시겠어요? 진행 상황은 계정에 저장됩니다.")) return;
  S.screen="loading"; render();
  try{ await saveGame(); }catch(e){}
  clearInterval(timer); timer=null;
  S.screen="mode"; render();
}

/* ---------- 거래 / 은행 ---------- */
function execute(t, side, qty){
  const s=G.market.find(x=>x.t===t); if(!s||qty<=0) return;
  const cost=s.p*qty;
  if(side==="buy"){
    if(G.cash<cost){ alert("현금이 부족합니다."); return; }
    G.cash-=cost;
    const h=G.holdings[t]||{shares:0,avgCost:0};
    const ns=h.shares+qty; h.avgCost=(h.avgCost*h.shares+cost)/ns; h.shares=ns;
    G.holdings[t]=h;
  } else {
    const h=G.holdings[t];
    if(!h||h.shares<qty){ alert("보유 수량이 부족합니다."); return; }
    G.cash+=cost; h.shares-=qty;
    if(h.shares===0) delete G.holdings[t]; else G.holdings[t]=h;
  }
  G.history.unshift({id:Date.now(),t,side,qty,price:s.p,at:Date.now()});
  G.history=G.history.slice(0,40);
  closeModal(); saveGameBg(); render();
}
function deposit(amt){ amt=Math.floor(amt);
  if(!amt||amt<=0) return;
  if(G.cash<amt){ alert("현금이 부족합니다."); return; }
  G.cash-=amt; G.bank=(G.bank||0)+amt; saveGameBg(); render();
}
function withdraw(amt){ amt=Math.floor(amt);
  if(!amt||amt<=0) return;
  if((G.bank||0)<amt){ alert("예치금이 부족합니다."); return; }
  G.bank-=amt; G.cash+=amt; saveGameBg(); render();
}

    const b=$("buy-"+s.t), sl=$("sell-"+s.t);
    if(b) b.onclick=()=>openTrade(s.t,"buy");
    if(sl) sl.onclick=()=>openTrade(s.t,"sell");
  });
  const dep=$("bankDep"), wd=$("bankWd");
  if(dep) dep.onclick=()=>deposit(+$("bankAmt").value);
  if(wd) wd.onclick=()=>withdraw(+$("bankAmt").value);
}
function marketCard(){
  return `<div class="card" style="padding:18px;margin-bottom:16px">
    <div class="row" style="margin-bottom:6px"><b>시장</b><span class="muted sm">8종목 · 1분마다 변동</span></div>
    ${G.market.map(s=>{
      const ch=(s.p-s.base)/s.base, tk=s.p-s.prev, up=ch>=0;
      return `<div class="row stock-row">
        <div><div style="font-weight:700">${s.t} <span class="muted sm">${s.name}</span></div>
          <div class="muted sm">${s.sector}</div></div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="text-align:right">
            <div class="mono ${tk>=0?'up':'down'}">${price(s.p)}</div>
            <div class="mono sm ${up?'up':'down'}">${pct(ch)}</div></div>
          <div style="display:flex;gap:6px">
            <button id="buy-${s.t}" class="tradebtn t-buy">매수</button>
            <button id="sell-${s.t}" class="tradebtn t-sell">매도</button></div>
        </div></div>`;
    }).join("")}</div>`;
}
function holdingsCard(){
  const hs=Object.entries(G.holdings);
  return `<div class="card" style="padding:18px">
    <div class="row" style="margin-bottom:6px"><b>보유 종목</b></div>
    ${hs.length===0 ? `<div class="ghost">아직 보유한 종목이 없습니다.</div>` :
    hs.map(([t,h])=>{
      const s=G.market.find(x=>x.t===t), cur=s?s.p:h.avgCost;
      const plv=(cur-h.avgCost)*h.shares, plp=(cur-h.avgCost)/h.avgCost, up=plv>=0;
      return `<div class="row hold-row">
        <div><div style="font-weight:700">${t}</div>
          <div class="muted sm mono">${h.shares}주 · 평단 ${price(h.avgCost)}</div></div>
        <div style="text-align:right">
          <div class="mono">₩${won(cur*h.shares)}</div>
          <div class="mono sm ${up?'up':'down'}">${up?'+':''}${won(plv)} (${pct(plp)})</div></div>
      </div>`;
    }).join("")}</div>`;
}
function bankCard(){
  return `<div class="card" style="padding:18px;margin-bottom:16px">
    <div class="row" style="margin-bottom:8px"><b>🏦 은행</b>
      <span class="blue sm mono">이자 1분당 ${(G.rate*100).toFixed(1)}%</span></div>
    <div class="row" style="margin-bottom:10px"><span class="muted sm">예치금</span>
      <span class="mono" style="font-size:17px;font-weight:700">₩${won(G.bank||0)}</span></div>
    <input id="bankAmt" class="field" type="number" placeholder="금액 입력" style="margin-top:0" />
    <div style="display:flex;gap:8px;margin-top:8px">
      <button id="bankDep" class="tradebtn t-buy" style="flex:1;text-align:center">입금</button>
      <button id="bankWd" class="tradebtn t-sell" style="flex:1;text-align:center">출금</button></div>
    <div class="muted sm" style="margin-top:8px">예치금은 매 분 이자가 붙습니다. 금리 뉴스에 따라 이자율이 변해요.</div>
  </div>`;
}
function newsCard(){
  const tl={1:"1단계",2:"2단계",3:"3단계"};
  return `<div class="card" style="padding:18px;margin-bottom:16px">
    <div class="row" style="margin-bottom:6px"><b>뉴스</b><span class="muted sm">신문사·등급마다 정보의 질이 다름</span></div>
    ${G.news.map(n=>`<div class="news-row">
        <div style="display:flex;align-items:center;gap:7px">
          <span class="tier-chip tier${n.tier}">${tl[n.tier]}</span>
          <span class="muted sm">${n.company}</span></div>
        <div style="margin-top:7px;font-size:14px;line-height:1.5">${n.text}</div>
      </div>`).join("")}</div>`;
}
function historyCard(){
  return `<div class="card" style="padding:18px">
    <div class="row" style="margin-bottom:6px"><b>거래내역</b><span class="muted sm">${G.history.length}건</span></div>
    ${G.history.length===0 ? `<div class="ghost">아직 거래가 없습니다.</div>` :
    G.history.map(h=>`<div class="row hist-row">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="badge ${h.side==='buy'?'b-buy':'b-sell'}">${h.side==='buy'?'매수':'매도'}</span>
        <b>${h.t}</b><span class="muted sm mono">${h.qty}주 @ ${price(h.price)}</span></div>
    </div>`).join("")}</div>`;
}

/* ---------- 랭킹 탭 (글로벌) ---------- */
function rankShell(){
  return `<div class="card" style="padding:18px">
      <div class="row" style="margin-bottom:6px"><b>글로벌 랭킹</b>
        <span class="muted sm">전체 유저 · 총자산 순</span></div>
      <div id="rankList"><div class="spin" style="margin:20px auto"></div></div>
    </div>`;
}
async function loadLeaderboard(){
  try{ await saveGame(); }catch(e){}
  let rows=[];
  try{ rows=await fetchLeaderboard(); }catch(e){}
  const el=$("rankList"); if(!el) return;
  if(!rows.length){ el.innerHTML=`<div class="ghost">아직 기록이 없습니다.</div>`; return; }
  const medal=i=>["🥇","🥈","🥉"][i]||`${i+1}`;
  el.innerHTML = rows.map((r,i)=>{
    const me = r.nickname===S.nickname;
    return `<div class="row rank-row" style="${me?'background:rgba(245,182,66,.06);border-radius:8px':''}">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="width:24px;text-align:center;font-weight:800">${medal(i)}</span>
        <b>${esc(r.nickname)}${me?' (나)':''}</b></div>
      <span class="mono ${r.net_worth>=START_CASH?'up':'down'}">₩${won(r.net_worth)}</span>
    </div>`;
  }).join("");
}

/* ---------- 거래 모달 ---------- */
let modalState=null;
function openTrade(t, side){
  modalState={t,side,qty:1};
  const wrap=document.createElement("div"); wrap.id="modal"; document.body.appendChild(wrap);
  renderModal();
}
function closeModal(){ const m=$("modal"); if(m) m.remove(); modalState=null; }
function renderModal(){
  if(!modalState) return;
  const {t,side,qty}=modalState;
  const s=G.market.find(x=>x.t===t), buy=side==="buy";
  const cost=s.p*qty, owned=G.holdings[t]?.shares||0, maxBuy=Math.floor(G.cash/s.p);
  $("modal").innerHTML=`
  <div class="modal-bg" id="mbg">
    <div class="card" style="width:100%;max-width:360px;padding:22px" onclick="event.stopPropagation()">
      <div class="row" style="margin-bottom:16px">
        <div><div style="font-size:20px;font-weight:800">${s.t}
          <span class="badge ${buy?'b-buy':'b-sell'}">${buy?'매수':'매도'}</span></div>
          <div class="muted sm">${s.name}</div></div>
        <button id="mx" class="muted" style="font-size:20px">✕</button></div>
      <div class="row" style="margin-bottom:14px"><span class="muted sm">현재가</span>
        <span class="mono" style="font-size:18px;font-weight:700">${price(s.p)}</span></div>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <button id="mm" class="card" style="width:44px;height:44px;font-size:20px;font-weight:800">−</button>
        <input id="mq" class="field" style="text-align:center;margin-top:0" value="${qty}" />
        <button id="mp" class="card" style="width:44px;height:44px;font-size:20px;font-weight:800">+</button>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:16px">
        <button class="qbtn card sm" data-q="${buy?maxBuy:owned}" style="flex:1;padding:7px;color:var(--muted)">${buy?'최대':'전량'} (${buy?maxBuy:owned})</button>
        <button class="qbtn card sm" data-q="${Math.floor((buy?maxBuy:owned)/2)}" style="flex:1;padding:7px;color:var(--muted)">절반</button>
      </div>
      <div class="row" style="margin-bottom:16px"><span class="muted sm">${buy?'필요 현금':'예상 수령액'}</span>
        <span class="mono" style="font-size:16px;font-weight:700">₩${won(cost)}</span></div>
      <button id="mgo" class="btn-primary" style="background:${buy?'var(--up)':'var(--down)'};color:#0E1116">
        ${qty}주 ${buy?'매수':'매도'}</button>
      <div class="muted sm" style="text-align:center;margin-top:10px">
        ${buy?`보유 현금 ₩${won(G.cash)}`:`보유 수량 ${owned}주`}</div>
    </div>
  </div>`;
  $("mbg").onclick=closeModal;
  $("mx").onclick=closeModal;
  $("mm").onclick=()=>{ modalState.qty=Math.max(1,qty-1); renderModal(); };
  $("mp").onclick=()=>{ modalState.qty=qty+1; renderModal(); };
  $("mq").oninput=e=>{ modalState.qty=Math.max(1,parseInt(e.target.value)||1); };
  document.querySelectorAll(".qbtn").forEach(b=>b.onclick=()=>{ modalState.qty=Math.max(1,+b.dataset.q); renderModal(); });
  $("mgo").onclick=()=>execute(t,side,modalState.qty);
}

/* ===================================================================
   라우터
   =================================================================== */
function render(){
  if(S.screen!=="game"){ clearInterval(timer); timer=null; }
  switch(S.screen){
    case "config":  return renderConfig();
    case "loading": return renderLoading();
    case "auth":    return renderAuth();
    case "mode":    return renderMode();
    case "mp_entry":return renderMpEntry();
    case "mp_room": return renderMpRoom();
    case "mp_game": return renderMpGame();
    case "game":    return renderGame();
  }
}
boot();
</script>
